<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yick Hoe - Steel Handbook</title>
  <meta name="description" content="Browse Yick Hoe's structural steel product catalog — beams, pipes, channels, angles, plates, fittings, and more.">
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b0d12;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "Inter", sans-serif;
      overscroll-behavior: none;
    }

    .deck-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56px;
    }

    .search-wrap {
      position: relative;
      max-width: 420px;
      margin: 0 auto 28px;
      z-index: 600;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 11px 16px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .search-bar.focused {
      background: rgba(255, 255, 255, 0.065);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .search-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.2s ease;
    }

    .search-bar.focused .search-icon {
      color: rgba(255, 255, 255, 0.55);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .search-clear {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .search-clear.visible {
      display: flex;
    }

    .db-status {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .db-status.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .db-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      flex-shrink: 0;
      transition: background 0.4s ease;
    }

    .db-dot.connecting {
      background: rgba(255, 255, 255, 0.3);
      animation: db-pulse 1.2s ease-in-out infinite;
    }

    .db-dot.ok {
      background: #34d399;
      animation: none;
    }

    .db-dot.err {
      background: #fb7185;
      animation: none;
    }

    @keyframes db-pulse {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    .db-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.3);
      transition: color 0.4s ease;
      white-space: nowrap;
    }

    .db-label.ok {
      color: rgba(52, 211, 153, 0.7);
    }

    .db-label.err {
      color: rgba(251, 113, 133, 0.7);
    }

    .db-divider {
      width: 1px;
      height: 12px;
      background: rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
    }

    .search-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #1a1d26;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow: 0 16px 32px -10px rgba(0, 0, 0, 0.65);
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-6px);
      transition: max-height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
        opacity 0.22s ease,
        transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }

    .search-suggestions.open {
      max-height: 340px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .suggestion-list {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 324px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .suggestion-list::-webkit-scrollbar {
      display: none;
    }

    .suggestion-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .suggestion-row:hover,
    .suggestion-row.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .suggestion-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .suggestion-text {
      flex: 1;
      min-width: 0;
    }

    .suggestion-sub {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggestion-cat {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 1px;
    }

    .suggestion-empty {
      padding: 16px 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
    }

    /* ── Viewport ── */
    .deck-viewport {
      width: 100%;
      height: 320px;
      position: relative;
      touch-action: none;
      outline: none;
      cursor: grab;
      transition: height 0.42s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .deck-viewport:active {
      cursor: grabbing;
    }

    .stage {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      perspective: 1200px;
    }

    /* ── Cards ── */
    .card {
      position: absolute;
      width: 190px;
      height: 260px;
      transform-style: preserve-3d;
      cursor: pointer;
      user-select: none;
      transition: height 0.42s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.48s cubic-bezier(0.4, 0.1, 0.2, 1);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      backface-visibility: hidden;
      box-sizing: border-box;
      background: var(--card-gradient);
      box-shadow: 0 16px 36px -8px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .front {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
    }

    .back {
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      padding: 18px;
    }

    .card-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .card-flip-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      position: absolute;
      top: 16px;
      right: 16px;
      flex-shrink: 0;
    }

    .card-label {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #fff;
    }

    .card-meta {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 3px;
    }

    .back-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .back-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.01em;
    }

    .back-close {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      cursor: pointer;
      pointer-events: auto;
      position: relative;
      z-index: 10;
    }

    .sub-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1 1 0;
      min-height: 0;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      mask-image: linear-gradient(to bottom, transparent 0px, black 10px, black calc(100% - 14px), transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 10px, black calc(100% - 14px), transparent 100%);
      padding: 4px 2px 8px;
    }

    .sub-list::-webkit-scrollbar {
      display: none;
    }

    .sub-item {
      background: rgba(255, 255, 255, 0.13);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      transition: background 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }

    .sub-item:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .sub-item.sub-item-highlight {
      background: rgba(255, 255, 255, 0.34);
      box-shadow: 0 0 0 1.5px rgba(255, 255, 255, 0.5);
    }

    /* ── Nav row ── */
    .nav-row {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .nav-arrow {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      transition: background 0.2s ease;
    }

    .nav-arrow:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .dot.active {
      background: rgba(255, 255, 255, 0.85);
      transform: scale(1.3);
    }

    /* ── Toast ── */
    #deckToast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(30, 32, 44, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      padding: 10px 18px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
      z-index: 9000;
      white-space: nowrap;
    }

    #deckToast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0d12;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.07);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Retry button ── */
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .retry-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    /* ── Focus visible ── */
    :focus-visible {
      outline: 2px solid rgba(255,255,255,0.5);
      outline-offset: 2px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {

      html,
      body {
        height: 100dvh;
      }

      .deck-wrap {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        padding: 0;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        box-sizing: border-box;
      }

      .search-wrap {
        flex-shrink: 0;
        max-width: 100%;
        margin: 16px 16px 12px;
      }

      .deck-viewport {
        flex: 1 1 0;
        min-height: 0;
        height: auto !important;
        touch-action: none;
        transition: none;
      }

      .card {
        width: 200px;
        height: 240px;
      }

      .card.flipped {
        height: calc(100% - 32px);
      }

      .nav-row {
        flex-shrink: 0;
        position: static;
        padding: 12px 0 16px;
      }
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

  <div class="deck-wrap" id="deckWrap" style="display:none">
    <div class="search-wrap" id="searchWrap">
      <div class="search-bar" id="searchBar">
        <span class="search-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4" />
            <line x1="10.4" y1="10.4" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" />
          </svg>
        </span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search categories" autocomplete="off"
          spellcheck="false">
        <div class="search-clear" id="searchClear">&#10005;</div>
        <div class="db-divider" id="dbDivider" style="opacity:0;transition:opacity 0.3s ease;"></div>
        <div class="db-status" id="dbStatus">
          <div class="db-dot connecting" id="dbDot"></div>
          <span class="db-label" id="dbLabel">—</span>
        </div>
      </div>
      <div class="search-suggestions" id="searchSuggestions">
        <div class="suggestion-list" id="suggestionList"></div>
      </div>
    </div>

    <div class="deck-viewport" id="viewport" tabindex="0" role="region" aria-label="Product categories">
      <div class="stage" id="stage"></div>
    </div>

    <div class="nav-row">
      <button class="nav-arrow" id="navLeft" aria-label="Previous category">&#8249;</button>
      <div class="dots" id="dots" role="list" aria-label="Category positions"></div>
      <button class="nav-arrow" id="navRight" aria-label="Next category">&#8250;</button>
    </div>
  </div>

  <div id="deckToast"></div>

  <script>
    const THEMES = [
      { gradient: "linear-gradient(160deg, #6366f1 0%, #3730a3 100%)", shade: "#2e2a7a", dot: "#818cf8" },
      { gradient: "linear-gradient(160deg, #10b981 0%, #065f46 100%)", shade: "#054d3a", dot: "#34d399" },
      { gradient: "linear-gradient(160deg, #f59e0b 0%, #b45309 100%)", shade: "#8a3f06", dot: "#fbbf24" },
      { gradient: "linear-gradient(160deg, #f43f5e 0%, #9f1239 100%)", shade: "#7d0f2f", dot: "#fb7185" },
      { gradient: "linear-gradient(160deg, #8b5cf6 0%, #4c1d95 100%)", shade: "#3b1578", dot: "#a78bfa" },
      { gradient: "linear-gradient(160deg, #06b6d4 0%, #0e7490 100%)", shade: "#0a5a6e", dot: "#22d3ee" },
    ];

    const CATEGORY_ICONS = [
      "&#9636;", "&#9650;", "&#9737;", "&#9881;", "&#10022;", "&#8734;",
    ];

    let items = [];
    let N = 0;

    async function checkDb() {
      const dot = document.getElementById('dbDot');
      const label = document.getElementById('dbLabel');
      const status = document.getElementById('dbStatus');
      const divider = document.getElementById('dbDivider');
      status.classList.add('visible');
      divider.style.opacity = '1';
      dot.className = 'db-dot connecting';
      label.className = 'db-label';
      label.textContent = '—';
      const t0 = performance.now();
      try {
        const res = await fetch('./database/directory.json', { method: 'HEAD', cache: 'no-store' });
        const ms = Math.round(performance.now() - t0);
        if (!res.ok && res.status !== 405) throw new Error();
        dot.className = 'db-dot ok';
        label.className = 'db-label ok';
        label.textContent = `${ms}ms`;
      } catch {
        const ms = Math.round(performance.now() - t0);
        dot.className = 'db-dot err';
        label.className = 'db-label err';
        label.textContent = `Fail ${ms}ms`;
      }
    }

    async function loadData() {
      try {
        const res = await fetch('./database/directory.json');
        if (!res.ok) throw new Error();
        const data = await res.json();
        items = data.catalog.map((cat, i) => ({
          text: cat.category,
          icon: CATEGORY_ICONS[i % CATEGORY_ICONS.length],
          theme: i % THEMES.length,
          subs: cat.items.map(item => item.name),
          subCount: cat.items.length,
          pageStart: Math.min(...cat.items.map(item => item.pageStart)),
          pageEnd: Math.max(...cat.items.map(item => item.pageEnd)),
          keywords: cat.items.flatMap(item => [item.name, ...(item.keywords || [])]),
          _rawItems: cat.items,
        }));
      } catch {
        items = [{
          text: "Failed to load",
          icon: "&#9888;",
          theme: 3,
          subs: ["Unable to load data \u2014 try refreshing in a few minutes"],
          keywords: [],
          subCount: 0,
          pageStart: null,
          pageEnd: null,
          _rawItems: [],
          isError: true,
        }];
      }
      N = items.length;
    }

    /* ── Layout constants ── */
    const CARD_W = 190;
    const CARD_H = 260;
    const SPACING = 200;
    const CURVE_ANGLE = 22;
    const Z_STEP = 90;
    const BASE_HEIGHT_DESKTOP = 260;
    const MAX_CARD_HEIGHT = 480;
    const ROW_HEIGHT = 40;
    const HEADER_HEIGHT = 44;
    const VPAD = 60;

    let position = 0;
    let dragging = false;
    let dragMoved = false;
    let dragX0 = 0;
    let dragP0 = 0;
    let raf = null;
    let isMobile = window.matchMedia('(max-width: 640px)').matches;
    let flippedIndex = null;

    let cardEls = [];

    const stage = document.getElementById('stage');
    const viewport = document.getElementById('viewport');
    const dotsEl = document.getElementById('dots');
    const searchInput = document.getElementById('searchInput');
    const searchBar = document.getElementById('searchBar');
    const searchClear = document.getElementById('searchClear');
    const searchSuggestions = document.getElementById('searchSuggestions');
    const suggestionList = document.getElementById('suggestionList');

    /* ─────────────────────────────────────────
       FIX: Build DOM once, render() only mutates transforms
       ───────────────────────────────────────── */
    function buildDeck() {
      stage.innerHTML = '';
      cardEls = [];

      items.forEach((item, index) => {
        const theme = THEMES[item.theme % THEMES.length];

        const card = document.createElement('div');
        card.className = 'card';
        card.style.setProperty('--card-gradient', theme.gradient);

        const subsHtml = item.subs.map(s =>
          `<div class="sub-item" role="listitem" data-sub="${s.replace(/"/g, '&quot;')}">${s}</div>`
        ).join('');

        const metaLine = item.isError ? ''
          : item.subCount === 1
            ? '<div class="card-meta">1 section</div>'
            : `<div class="card-meta">${item.subCount} sections &middot; p${item.pageStart}&ndash;${item.pageEnd}</div>`;

        const retryHtml = item.isError
          ? '<div style="padding:8px 2px"><button class="retry-btn" data-retry>&#8635; Retry</button></div>'
          : '';

        card.innerHTML = `
      <div class="card-inner">
        <div class="face front">
          <div class="card-flip-btn">&#8634;</div>
          <div class="card-icon">${item.icon}</div>
          <div class="card-label">${item.text}</div>
          ${metaLine}
        </div>
        <div class="face back">
          <div class="back-header">
            <div class="back-title">${item.text}</div>
            <div class="back-close">&#10005;</div>
          </div>
          <div class="sub-list" role="list">${subsHtml}${retryHtml}</div>
        </div>
      </div>`;

        /* Sub-item clicks */
        card.querySelectorAll('.sub-item').forEach(el => {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            const evt = new CustomEvent('deck:navigate', {
              bubbles: true,
              detail: { category: item.text, sub: el.dataset.sub, itemIndex: index }
            });
            document.dispatchEvent(evt);
            showNavToast(item.text, el.dataset.sub);
          });
        });

        /* Block sub-list pointerdown from bubbling to viewport drag */
        const subListEl = card.querySelector('.sub-list');
        subListEl.addEventListener('pointerdown', e => e.stopPropagation(), true);

        /* Close button */
        card.querySelector('.back-close').addEventListener('click', (e) => {
          e.stopPropagation();
          unflip();
        });

        /* Retry button */
        const retryBtn = card.querySelector('[data-retry]');
        if (retryBtn) {
          retryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            init();
          });
        }

        /* Card click — flip or navigate */
        card.addEventListener('click', (e) => {
          if (dragMoved) return;
          const offset = shortestOffset(index, position);
          const absOffset = Math.abs(offset);
          if (absOffset < 0.45) {
            flippedIndex === index ? unflip() : openFlip(index);
          } else {
            unflip();
            goTo(index);
          }
        });

        stage.appendChild(card);
        cardEls.push(card);
      });
    }

    function shortestOffset(index, pos) {
      let raw = index - pos;
      raw = ((raw % N) + N) % N;
      if (raw > N / 2) raw -= N;
      return raw;
    }

    function cardHeightFor(subsCount) {
      const needed = HEADER_HEIGHT + subsCount * ROW_HEIGHT + VPAD;
      return Math.max(BASE_HEIGHT_DESKTOP, Math.min(needed, MAX_CARD_HEIGHT));
    }

    function openFlip(index) {
      flippedIndex = index;
      if (!isMobile) {
        const h = cardHeightFor(items[index].subs.length);
        viewport.style.height = (h + VPAD) + 'px';
      }
      render();
    }

    function unflip() {
      if (flippedIndex === null) return;
      flippedIndex = null;
      if (!isMobile) {
        viewport.style.height = '320px';
      }
      render();
    }

    function render() {
      const center = ((Math.round(position) % N) + N) % N;

      [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === center));

      cardEls.forEach((el, index) => {
        const off = shortestOffset(index, position);
        const abs = Math.abs(off);
        const isFlipped = index === center && flippedIndex === index;

        if (abs > 3.2) {
          el.style.visibility = 'hidden';
          el.style.pointerEvents = 'none';
          return;
        }
        el.style.visibility = '';

        const tx = off * SPACING;
        const tz = -abs * Z_STEP;
        const ry = -off * CURVE_ANGLE;
        const sc = Math.max(1 - abs * 0.14, 0.35);
        const op = Math.max(1 - abs * 0.3, 0);

        el.style.transform = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${sc})`;
        el.style.zIndex = isFlipped ? '500' : String(Math.max(1, 100 - Math.round(abs * 10)));
        el.style.opacity = op;
        el.style.filter = abs > 0.3 ? `brightness(${Math.max(0.45, 1 - abs * 0.18)})` : 'none';
        el.style.pointerEvents = 'auto';

        if (isFlipped && !isMobile) {
          el.style.height = cardHeightFor(items[index].subs.length) + 'px';
        } else if (!isMobile) {
          el.style.height = '';
        }

        el.classList.toggle('flipped', isFlipped);
      });
    }

    function goTo(index, onComplete) {
      const offset = shortestOffset(index, position);
      animateTo(position + offset, onComplete);
    }

    function animateTo(target, onComplete) {
      cancelAnimationFrame(raf);
      const startPos = position;
      const startTime = performance.now();
      const dist = target - startPos;
      const duration = Math.min(Math.max(Math.abs(dist) * 130, 160), 480);

      const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

      function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        position = startPos + dist * easeOutCubic(t);
        render();
        if (t < 1) {
          raf = requestAnimationFrame(step);
        } else {
          position = target;
          render();
          if (onComplete) onComplete();
        }
      }
      raf = requestAnimationFrame(step);
    }

    function settle() {
      animateTo(Math.round(position));
    }

    /* ── Drag / pointer ── */
    viewport.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.sub-list')) return;
      dragging = true;
      dragMoved = false;
      dragX0 = e.clientX;
      dragP0 = position;
      cancelAnimationFrame(raf);
      viewport.setPointerCapture(e.pointerId);
      e.preventDefault();
    }, { passive: false });

    viewport.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - dragX0;
      if (Math.abs(dx) > 5) {
        dragMoved = true;
        if (flippedIndex !== null) unflip();
      }
      position = dragP0 - dx / SPACING;
      render();
    });

    const endDrag = () => {
      if (!dragging) return;
      dragging = false;
      settle();
    };
    viewport.addEventListener('pointerup', endDrag);
    viewport.addEventListener('pointercancel', endDrag);

    /* ── Wheel ── */
    viewport.addEventListener('wheel', (e) => {
      if (e.target.closest('.sub-list')) return;
      e.preventDefault();
      cancelAnimationFrame(raf);
      if (flippedIndex !== null) unflip();
      const delta = Math.abs(e.deltaY) > 60 ? Math.sign(e.deltaY) * 0.5 : e.deltaY * 0.007;
      position += delta;
      render();
      clearTimeout(viewport._wt);
      viewport._wt = setTimeout(settle, 120);
    }, { passive: false });

    /* ── Keyboard ── */
    document.addEventListener('keydown', (e) => {
      if (e.target === searchInput) return;
      if (e.key === 'Escape') unflip();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { unflip(); animateTo(Math.round(position) + 1); }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { unflip(); animateTo(Math.round(position) - 1); }
    });

    /* ── Nav buttons ── */
    document.getElementById('navLeft').addEventListener('click', () => {
      cancelAnimationFrame(raf); unflip(); animateTo(Math.round(position) - 1);
    });
    document.getElementById('navRight').addEventListener('click', () => {
      cancelAnimationFrame(raf); unflip(); animateTo(Math.round(position) + 1);
    });

    /* ── Responsive ── */
    window.matchMedia('(max-width: 640px)').addEventListener('change', (e) => {
      isMobile = e.matches;
      if (!isMobile && flippedIndex !== null) {
        const h = cardHeightFor(items[flippedIndex].subs.length);
        viewport.style.height = (h + VPAD) + 'px';
      } else if (isMobile) {
        viewport.style.height = '';
      }
      render();
    });

    /* ── Search ── */
    const searchWrapEl = document.getElementById('searchWrap');
    const searchIndex = [];

    let activeSuggestion = -1;
    let currentMatches = [];

    document.addEventListener('click', (e) => {
      if (!searchWrapEl.contains(e.target)) closeSuggestions();
      if (flippedIndex !== null && !viewport.contains(e.target) && !searchWrapEl.contains(e.target)) {
        unflip();
      }
    });

    function closeSuggestions() {
      searchSuggestions.classList.remove('open');
      activeSuggestion = -1;
    }

    function highlightSub(itemIndex, sub) {
      const el = stage.querySelector(`.card.flipped .sub-item[data-sub="${sub}"]`);
      if (!el) return;
      el.classList.add('sub-item-highlight');
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      setTimeout(() => el.classList.remove('sub-item-highlight'), 1400);
    }

    function openSubPage(match) {
      const params = new URLSearchParams();
      params.set('category', match.category);
      params.set('sub', match.sub);
      const url = window.location.pathname + '?' + params.toString();
      window.history.pushState({ category: match.category, sub: match.sub }, '', url);
      showNavToast(match.category, match.sub);
      handleUrlParams();
    }

    document.addEventListener('deck:navigate', (e) => {
      const { category, sub } = e.detail;
      openSubPage({ category, sub, itemIndex: e.detail.itemIndex });
    });

    function showNavToast(category, sub) {
      const toast = document.getElementById('deckToast');
      toast.innerHTML = `<span style="opacity:0.5;margin-right:6px;">&#128279;</span>${sub}<span style="opacity:0.4;margin:0 5px;">·</span><span style="opacity:0.5">${category}</span>`;
      toast.classList.add('visible');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('visible'), 2200);
    }

    function selectMatch(match, openCard = false) {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      closeSuggestions();
      searchInput.blur();

      if (openCard) {
        unflip();
        goTo(match.itemIndex, () => {
          openFlip(match.itemIndex);
          highlightSub(match.itemIndex, match.sub);
        });
      } else {
        openSubPage(match);
      }
    }

    function renderSuggestions(query) {
      const q = query.trim().toLowerCase();
      if (!q) { closeSuggestions(); return; }

      currentMatches = searchIndex.filter(m =>
        (m.sub || '').toLowerCase().includes(q) ||
        (m.category || '').toLowerCase().includes(q) ||
        (m.subSub || '').toLowerCase().includes(q) ||
        (m.keywords || []).some(k => k.toLowerCase().includes(q))
      ).slice(0, 8).map(m => ({
        ...m,
        isCategoryMatch: m.isSubSub || (m.category.toLowerCase().includes(q) && !m.sub.toLowerCase().includes(q)),
      }));

      activeSuggestion = -1;
      suggestionList.innerHTML = '';

      if (currentMatches.length === 0) {
        suggestionList.innerHTML = '<div class="suggestion-empty">No matches</div>';
      } else {
        currentMatches.forEach((match, i) => {
          const row = document.createElement('div');
          row.className = 'suggestion-row';
          row.dataset.index = i;
          const actionIcon = match.isCategoryMatch
            ? `<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="opacity:0.4;flex-shrink:0"><rect x="1" y="1" width="10" height="10" rx="3" stroke="currentColor" stroke-width="1.3"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="6" y1="4" x2="8" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="6" y1="8" x2="8" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`
            : `<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="opacity:0.4;flex-shrink:0"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7" y1="3.5" x2="10" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7" y1="8.5" x2="10" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
          const subLabel = match.isSubSub
            ? match.subSub
            : match.sub;
          const catLabel = match.isSubSub
            ? `${match.category} &rarr; ${match.sub}`
            : match.category;
          row.innerHTML = `
        <div class="suggestion-dot" style="background:${THEMES[match.theme % THEMES.length].dot}"></div>
        <div class="suggestion-text">
          <div class="suggestion-sub">${subLabel}</div>
          <div class="suggestion-cat">${catLabel}</div>
        </div>${actionIcon}`;
          row.addEventListener('mousedown', (e) => {
            e.preventDefault();
            selectMatch(match, match.isCategoryMatch);
          });
          suggestionList.appendChild(row);
        });
      }
      searchSuggestions.classList.add('open');
    }

    function updateActiveHighlight() {
      [...suggestionList.children].forEach((row, i) => row.classList.toggle('active', i === activeSuggestion));
    }

    searchInput.addEventListener('input', () => {
      searchClear.classList.toggle('visible', searchInput.value.length > 0);
      renderSuggestions(searchInput.value);
    });
    searchInput.addEventListener('focus', () => {
      searchBar.classList.add('focused');
      if (searchInput.value.trim()) renderSuggestions(searchInput.value);
    });
    searchInput.addEventListener('blur', () => searchBar.classList.remove('focused'));
    searchInput.addEventListener('keydown', (e) => {
      if (!searchSuggestions.classList.contains('open') || !currentMatches.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); activeSuggestion = Math.min(activeSuggestion + 1, currentMatches.length - 1); updateActiveHighlight(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeSuggestion = Math.max(activeSuggestion - 1, 0); updateActiveHighlight(); }
      else if (e.key === 'Enter') { e.preventDefault(); const pick = activeSuggestion >= 0 ? currentMatches[activeSuggestion] : currentMatches[0]; if (pick) selectMatch(pick, pick.isCategoryMatch); }
      else if (e.key === 'Escape') { closeSuggestions(); searchInput.blur(); }
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      closeSuggestions();
      searchInput.focus();
    });

    function handleUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('category');
      const sub = params.get('sub');
      if (!cat || !sub || !items.length || items[0].isError) return;
      const idx = items.findIndex(i => i.text === cat);
      if (idx === -1) return;
      unflip();
      goTo(idx, () => {
        openFlip(idx);
        setTimeout(() => highlightSub(idx, sub), 420);
      });
    }

    /* ── Init ── */
    async function init() {
      const loading = document.getElementById('loadingOverlay');
      const deckWrap = document.getElementById('deckWrap');
      deckWrap.style.display = '';
      await loadData();
      checkDb();

      items.forEach(() => {
        const d = document.createElement('div');
        d.className = 'dot';
        dotsEl.appendChild(d);
      });

      /* Build search index */
      items.forEach((item, itemIndex) => {
        item.subs.forEach(sub => {
          searchIndex.push({ itemIndex, category: item.text, sub, theme: item.theme, keywords: item.keywords || [] });
        });
        (item._rawItems || []).forEach(rawItem => {
          (rawItem.subItems || []).forEach(subItem => {
            searchIndex.push({
              itemIndex,
              category: item.text,
              sub: rawItem.name,
              subSub: subItem.name,
              isSubSub: true,
              theme: item.theme,
              keywords: [...(item.keywords || []), ...(rawItem.keywords || [])],
            });
          });
        });
      });

      /* FIX: Build card DOM once, then render() only updates transforms */
      buildDeck();
      render();
      loading.classList.add('hidden');
      handleUrlParams();
      window.addEventListener('popstate', () => {
        const p = new URLSearchParams(window.location.search);
        if (p.has('category') && p.has('sub')) handleUrlParams();
        else unflip();
      });
    }

    init();
  </script>
</body>

</html>
